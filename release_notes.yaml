- version: "0.5.1"
  date: "2026-05-10"
  summary: "UI 体验小改进 + onnxruntime-gpu 跨平台修复"
  entries:
    - kind: improved
      summary: "打标筛选页加全屏 preview + 键盘 accept/remove 快捷键（#27）"
      pr_refs: [27]
      detail: |
