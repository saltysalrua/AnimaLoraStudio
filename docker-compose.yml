services:
  studio:
    image: ${ANIMALORASTUDIO_IMAGE:-ghcr.io/saltysalrua/animalorastudio:latest}
    # 本地构建时可改为: build: { context: ., dockerfile: .ide/Dockerfile }
    # 覆盖镜像: ANIMALORASTUDIO_IMAGE=ghcr.io/<owner>/animalorastudio:sha-<sha> docker compose up
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - .:/workspace
    ports:
      - "8765:8765"
    working_dir: /workspace
    command: bash -c "bash .ide/setup.sh && bash studio.sh"
    restart: unless-stopped
