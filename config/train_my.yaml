# AnimaLoraStudio 训练配置（CNB 部署版）
# 此文件由 schema studio.schema.TrainingConfig 校验，未知字段会自动报错。
# 修改前请参考：schema.py 完整说明 或 Studio 前端 Train 页。

# ============================================================================
# 模型路径（在 CNB 环境中通常由 secrets 或挂载路径替代）
# ============================================================================
transformer_path: "models/diffusion_models/anima-preview3-base.safetensors"
vae_path: "models/vae/qwen_image_vae.safetensors"
text_encoder_path: "models/text_encoders"
t5_tokenizer_path: "models/t5_tokenizer"

# ============================================================================
# 数据集
# ============================================================================
data_dir: "./dataset"
resolution: 1024

# ============================================================================
# LoRA / LoKr
# ============================================================================
lora_type: "lokr"
lora_rank: 32
lora_alpha: 32.0
lokr_factor: 8
lora_dropout: 0.05

# ============================================================================
# 训练参数
# ============================================================================
epochs: 200
max_steps: 0
batch_size: 4
grad_accum: 1
learning_rate: 1.0
lr_scheduler: "none"
optimizer_type: "prodigy"
weight_decay: 0.0
grad_clip_max_norm: 0
mixed_precision: "bf16"
grad_checkpoint: true
xformers: false
num_workers: 0

# ============================================================================
# 输出与保存
# ============================================================================
output_dir: "./output"
output_name: "anima_lora"
save_every: 0
save_every_steps: 100
save_state_every: 500
seed: 42

# ============================================================================
# 采样
# ============================================================================
sample_every: 0
sample_steps: 100
sample_infer_steps: 25
sample_cfg_scale: 4.0
sample_sampler_name: "er_sde"
sample_scheduler: "simple"
sample_prompt: "newest, safe, 1girl, masterpiece, best quality"
sample_prompts:
  - "newest, safe, 1girl, masterpiece, best quality"

# ============================================================================
# 监控与进度（CNB 云端建议全部静默）
# ============================================================================
loss_curve_steps: 200
no_progress: false
log_every: 10
